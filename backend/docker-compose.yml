version: '3.8'

services:
  # Banco de Dados Vetorial para o RAG
  qdrant:
    image: qdrant/qdrant:latest
    container_name: agronomy_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  # Broker para Celery e Flower
  redis:
    image: redis:latest
    container_name: agronomy_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Banco de Dados Relacional
  postgres:
    image: postgres:15
    container_name: agronomy_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agronomy
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  qdrant_storage:
  redis_data:
  postgres_data: